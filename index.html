var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(IV)},key,b2u(CT));return new TextDecoder().decode(pt);}
async function go(){var err=document.getElementById('err');err.textContent='';var pw=document.getElementById('pw').value;
try{var html=await dec(pw);try{sessionStorage.setItem(SK,pw)}catch(e){}document.open();document.write(html);document.close();}
catch(e){err.textContent='Contraseña incorrecta';}}
